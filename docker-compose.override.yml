version: "3.8"

services:
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: execra-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Jaeger Thrift HTTP (legacy)
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
