version: "3.9"

services:
  execra-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: execra-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - execra-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  execra-db:
    image: redis:7-alpine
    container_name: execra-db
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  execra-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: execra-dashboard
    ports:
      - "5173:5173"
    depends_on:
      - execra-api